<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Streamline Cleaning Services | Professional Home & Commercial Cleaning</title>
  <meta name="description" content="Streamline Cleaning Services – Professional, reliable, and meticulous home and commercial cleaning tailored to your lifestyle. Book online in minutes." />

  <meta name="robots" content="index, follow" />
  <meta name="author" content="Streamline Cleaning Services" />

  <!-- Canonical (updated dynamically by router) -->
  <link rel="canonical" href="https://streamlinecleaning.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Streamline Cleaning Services" />
  <meta property="og:title" content="Streamline Cleaning Services | Professional Home & Commercial Cleaning" />
  <meta property="og:description" content="Professional, reliable, and meticulous home and commercial cleaning tailored to your lifestyle. Book online in minutes." />
  <meta property="og:url" content="https://streamlinecleaning.com/" />
  <meta property="og:image" content="https://streamlinecleaning.com/logo.png" />
  <meta property="og:image:width" content="400" />
  <meta property="og:image:height" content="400" />
  <meta property="og:image:alt" content="Streamline Cleaning Services logo" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Streamline Cleaning Services" />
  <meta name="twitter:description" content="Professional home and commercial cleaning. Book online in minutes." />
  <meta name="twitter:image" content="https://streamlinecleaning.com/logo.png" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
  <link rel="shortcut icon" href="/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

  <!-- Web Manifest -->
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#f472b6" />
  <meta name="msapplication-TileColor" content="#f472b6" />

  <!-- JSON-LD Structured Data — LocalBusiness -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "@id": "https://streamlinecleaning.com/#business",
    "name": "Streamline Cleaning Services",
    "description": "Professional, reliable, and meticulous home and commercial cleaning tailored to your lifestyle.",
    "url": "https://streamlinecleaning.com",
    "logo": {
      "@type": "ImageObject",
      "url": "https://streamlinecleaning.com/logo.png",
      "width": 400,
      "height": 400
    },
    "image": "https://streamlinecleaning.com/logo.png",
    "priceRange": "$$",
    "areaServed": {
      "@type": "Country",
      "name": "United States"
    },
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Cleaning Services",
      "itemListElement": [
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Standard Clean",
            "description": "Regular maintenance cleaning covering all main living areas, bathrooms, and kitchen surfaces."
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Deep Clean",
            "description": "A thorough top-to-bottom clean including inside appliances, baseboards, and hard-to-reach areas."
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Move-In / Move-Out Cleaning",
            "description": "Full property cleaning for vacant homes including appliance and cabinet interiors."
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Commercial Cleaning",
            "description": "Office and commercial space cleaning with flexible scheduling including evenings and weekends."
          }
        }
      ]
    },
    "openingHoursSpecification": [
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "09:00",
        "closes": "18:00"
      }
    ],
    "sameAs": []
  }
  </script>

  <!-- JSON-LD Structured Data — WebSite (enables Google Sitelinks) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "@id": "https://streamlinecleaning.com/#website",
    "url": "https://streamlinecleaning.com",
    "name": "Streamline Cleaning Services",
    "description": "Professional home and commercial cleaning. Book online in minutes."
  }
  </script>

  <!-- JSON-LD Structured Data — SiteNavigationElement (tells Google your key pages) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Site Navigation",
    "itemListElement": [
      {
        "@type": "SiteNavigationElement",
        "position": 1,
        "name": "Book a Cleaning",
        "description": "Schedule your professional cleaning service in minutes.",
        "url": "https://streamlinecleaning.com/booking"
      },
      {
        "@type": "SiteNavigationElement",
        "position": 2,
        "name": "Our Services",
        "description": "Standard, deep, move-in/out, and commercial cleaning packages.",
        "url": "https://streamlinecleaning.com/#services"
      },
      {
        "@type": "SiteNavigationElement",
        "position": 3,
        "name": "Client Reviews",
        "description": "Read real reviews from satisfied Streamline Cleaning clients.",
        "url": "https://streamlinecleaning.com/reviews"
      },
      {
        "@type": "SiteNavigationElement",
        "position": 4,
        "name": "Gallery",
        "description": "Before and after photos from residential and commercial jobs.",
        "url": "https://streamlinecleaning.com/gallery"
      },
      {
        "@type": "SiteNavigationElement",
        "position": 5,
        "name": "Contact",
        "description": "Get in touch with Streamline Cleaning Services.",
        "url": "https://streamlinecleaning.com/#contact"
      }
    ]
  }
  </script>
</head>
<body>

</body>
</html>
